<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Redes Sociales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:url(imagenes/fondo.png);
            padding: 20px;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 300px;
            width: 100%;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 70px;  /* Altura reducida */
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            padding: 8px;
        }

        .social-btn i {
            font-size: 24px;  /* Tamaño de icono reducido */
            margin-bottom: 3px;
            transition: all 0.3s ease;
        }

        .social-btn span {
            font-size: 14px;  /* Tamaño de texto reducido */
            color: #333;
            transition: all 0.3s ease;
        }

        /* Colores originales */
        .facebook { color: #1877F2; }
        .discord { color: #5865F2; }
        .youtube { color: #FF0000; }
        .tiktok { color: #000000; }
        .instagram { color: #E1306C; }
        .twitter { color: #1DA1F2; }

        /* Efectos hover */
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .social-btn.facebook:hover {
            background-color: #1877F2;
        }
        .social-btn.discord:hover {
            background-color: #5865F2;
        }
        .social-btn.youtube:hover {
            background-color: #FF0000;
        }
        .social-btn.tiktok:hover {
            background-color: #000000;
        }
        .social-btn.instagram:hover {
            background-color: #E1306C;
        }
        .social-btn.twitter:hover {
            background-color: #1DA1F2;
        }

        .social-btn:hover i, 
        .social-btn:hover span {
            color: white;
        }

        @media (max-width: 600px) {
            .social-container {
                max-width: 250px;
            }
            
            .social-btn {
                height: 60px;  /* Altura aún más reducida en móviles */
            }
            
            .social-btn i {
                font-size: 22px;
            }
            
            .social-btn span {
                font-size: 13px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="social-container">
        <a href="https://www.facebook.com/profile.php?id=61577592985252" target="_blank" class="social-btn facebook" onmouseover="changeColor('facebook')" onmouseout="resetColor('facebook')">
            <i class="fab fa-facebook"></i>
            <span>Facebook</span>
        </a>
        <a href="https://discord.gg/vmCx6D4VPP" target="_blank" class="social-btn discord" onmouseover="changeColor('discord')" onmouseout="resetColor('discord')">
            <i class="fab fa-discord"></i>
            <span>Discord</span>
        </a>
        <a href="https://www.youtube.com/@Wasabi_Gam1ng" target="_blank" class="social-btn youtube" onmouseover="changeColor('youtube')" onmouseout="resetColor('youtube')">
            <i class="fab fa-youtube"></i>
            <span>YouTube</span>
        </a>
        <a href="https://www.tiktok.com/@wasabi_gam1ng" target="_blank" class="social-btn tiktok" onmouseover="changeColor('tiktok')" onmouseout="resetColor('tiktok')">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>
        <a href="https://www.instagram.com/wasabigam1ng/?igsh=c2c3MmQybHhldWJo#" target="_blank" class="social-btn instagram" onmouseover="changeColor('instagram')" onmouseout="resetColor('instagram')">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>
        <a href="https://x.com/i/flow/login?redirect_after_login=%2FWasabiGam1ng" target="_blank" class="social-btn twitter" onmouseover="changeColor('twitter')" onmouseout="resetColor('twitter')">
            <i class="fab fa-twitter"></i>
            <span>Twitter</span>
        </a>
    </div>

    <script>
        function changeColor(network) {
            const btn = document.querySelector(`.${network}`);
            const icon = btn.querySelector('i');
            const text = btn.querySelector('span');
            
            icon.style.color = 'white';
            text.style.color = 'white';
        }
        
        function resetColor(network) {
            const btn = document.querySelector(`.${network}`);
            const icon = btn.querySelector('i');
            const text = btn.querySelector('span');
            
            icon.style.color = '';
            text.style.color = '#333';
        }
    </script>
</body>
</html>
